services:
  postgres:
    container_name: store_postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextjs:
    container_name: store_nextjs
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run build && npx prisma migrate deploy && npm start -- --hostname 0.0.0.0"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      LINE_CLIENT_ID: ${LINE_CLIENT_ID}
      LINE_CLIENT_SECRET: ${LINE_CLIENT_SECRET}
      LINE_CALLBACK_URL: ${LINE_CALLBACK_URL}
    ports:
      - "3500:3000"
    volumes:
      - ./nextjs:/app
      - nextjs_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  nextjs_node_modules: