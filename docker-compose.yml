services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: env_subscribe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d env_subscribe"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextjs:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    environment:
      NODE_ENV: development
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: change-me-in-production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/env_subscribe?schema=public
    ports:
      - "3000:3000"
    volumes:
      - ./nextjs:/app
      - nextjs_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  nextjs_node_modules: